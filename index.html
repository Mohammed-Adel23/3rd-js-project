<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ping Coming Soon Page Master</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img class="logo-img" src="img/logo.svg" />
      </div>
      <div class="states-container">
        <p class="states">We are launching <span>soon!</span></p>
      </div>
      <div class="subs-container">
        <p class="subs-text">Subscribe and get notified</p>
      </div>
      <div class="search-container">
        <input
          class="search-box"
          type="email"
          id="search-box"
          placeholder="Your email address..."
        />
        <p class="done-msg" id="done-msg">you will be notifyed !</p>
        <p class="error-msg" id="error-msg">
          please provide a valid email address
        </p>
        <button id="notify-btn" class="notify-btn">Notify Me</button>
      </div>
      <div class="dashbord-container">
        <img class="dashbord-img" src="img/illustration-dashboard.png" alt="" />
      </div>
      <div class="platforms-container">
        <div class="facebook-icon-container">
          <img
            class="facebook-icon"
            src="img/letter-f-blue-transparent-icon.svg"
          />
        </div>
        <div class="twitter-icon-container">
          <img class="twitter-icon" src="img/twitter-color-svgrepo-com.svg" />
        </div>
        <div class="insagram-icon-container">
          <img class="instagram-icon" src="img/instagram-svgrepo-com.svg" />
        </div>
      </div>
      <div class="copyright-container">
        <p>&copy; Copy right Ping. All rights reserved.</p>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
